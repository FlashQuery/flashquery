# ============================================================================
# FlashQuery — Configuration
# ============================================================================
# This file defines the structure and behavior of your FlashQuery instance.
# Per-install values (URLs, keys, paths, identity) are kept in the root .env
# file and referenced here as ${VAR} — so this file stays the same across
# installations and can be edited freely without touching secrets.
#
# The easiest way to generate this file for a new install is to run
# `./setup/setup.sh` from the repo root, which copies this template to
# flashquery.yml and creates the .env file that fills in the ${VAR}
# references. You can edit either file by hand at any time afterwards.
#
# Start FlashQuery with:
#   flashquery start --config ./flashquery.yml
# ============================================================================


# ─── Instance Identity ──────────────────────────────────────────────────────
# The instance's human-readable name and unique ID. Every entity FlashQuery
# writes to the database is tagged with this ID, so if you run more than one
# instance against the same Supabase database, each must have a distinct ID.

instance:
  name: "${INSTANCE_NAME}"
  id: "${INSTANCE_ID}"

  vault:
    # Absolute or relative path to the markdown vault directory. Obsidian
    # vaults work out of the box; any directory of .md files will do.
    path: "${VAULT_PATH}"

    # File extensions FlashQuery will index. Add .txt, .mdx, etc. here if
    # your vault uses them; leave as ['.md'] for standard Obsidian/markdown.
    markdown_extensions: [".md"]


# ─── Server ─────────────────────────────────────────────────────────────────
# Hostname and port FlashQuery advertises for itself. Used for documentation
# and (in the future) URL construction by clients.
#
# NOTE: IN THE CURRENT BUILD, THE VALUES IN THIS SECTION ARE NOT YET
# CONSUMED BY THE RUNTIME. THE HTTP LISTENER BINDS TO :: (IPv6 DUAL-STACK,
# ALL INTERFACES) AND READS ITS PORT FROM mcp.port BELOW (FALLING BACK TO
# 3100). CHANGING server.host OR server.port HERE WILL NOT CHANGE THE BIND
# ADDRESS OR PORT TODAY — THE FIELDS ARE RETAINED FOR FORWARD COMPATIBILITY
# AND AS THE CONVENTIONAL PLACE TO DOCUMENT WHAT URL YOUR INSTALLATION IS
# REACHABLE AT.
#
# A fully qualified domain name is fine here (e.g. "flashquery.example.com"),
# but note that FlashQuery itself does not terminate TLS or route by host
# header. If you host FlashQuery on a public FQDN, you'll need a reverse
# proxy (nginx, Caddy, Traefik, Cloudflare Tunnel, etc.) in front of it to:
#   - Terminate TLS at the FQDN
#   - Forward requests to FlashQuery's internal port (mcp.port, default 3100)
#   - Optionally restrict paths, add rate limits, or filter by IP
# MCP clients then connect to https://<fqdn>/mcp with the bearer token
# issued by FlashQuery's /token endpoint. See docs/DEPLOYMENT.md for
# worked Caddy, nginx, and Cloudflare Tunnel examples, plus the one
# gotcha worth knowing — disable response buffering in the proxy so
# streamable-http clients receive server-sent events as they're produced.

server:
  host: "localhost"
  port: 3100


# ─── Supabase Connection ────────────────────────────────────────────────────
# Credentials come from the root .env file. See .env.example for where to
# find each value (cloud dashboard vs. self-hosted bundle). DATABASE_URL must
# point at direct Postgres or a session-capable/session-mode pooler. Startup
# fails closed for transaction-mode pooler URLs because session advisory locks
# cannot be proven stable there.

supabase:
  url: "${SUPABASE_URL}"
  service_role_key: "${SUPABASE_SERVICE_ROLE_KEY}"
  database_url: "${DATABASE_URL}"

  # skip_ddl controls whether this instance attempts to create or verify the
  # shared FlashQuery schema at startup. Set to true for a secondary instance
  # that points at a database already initialized by a primary — it will then
  # skip DDL and start faster. The primary (or any setup that creates the
  # database from scratch) must leave this false.
  skip_ddl: false


# ─── Git Integration ────────────────────────────────────────────────────────
# FlashQuery can auto-commit vault changes to a git repository inside the
# vault directory. This is independent of the database — commits capture the
# markdown state on disk after each document-changing tool call.

git:
  # Auto-commit every time a document is created, changed, or removed in the
  # vault. When true, the vault directory must be a git repository (run
  # `git init` inside your VAULT_PATH if it isn't one already).
  auto_commit: true

  # Auto-push commits to the configured remote after each commit. Typically
  # left false — most users push manually or on a schedule. Requires remote
  # credentials to be configured in the vault's local git config.
  auto_push: false

  remote: "origin"
  branch: "main"

  # Backup: use the standalone CLI command for reliable, OS-scheduled backups:
  #   flashquery backup --config ./flashquery.yml
  # This writes a JSON snapshot of every FlashQuery table to
  # [vault_path]/.fqc/backup.json and (if the vault is a git repo) commits
  # it. Use --db-only to skip the full vault commit+tag.
  # Recommended: schedule this nightly with launchd (macOS) or cron (Linux).
  # Example crontab: 0 2 * * * /usr/local/bin/flashquery backup --config /path/to/flashquery.yml


# ─── MCP Server ─────────────────────────────────────────────────────────────
# Configuration for the Model Context Protocol — how clients like Claude
# Desktop, Claude Code, or Claude Cowork connect and authenticate.

mcp:
  # Transport options:
  #   streamable-http — HTTP-based transport with bearer-token auth. Works
  #                     cleanly with Claude Cowork, Claude Code, remote MCP
  #                     clients, and most HTTP tooling. This is the default
  #                     because it's the most broadly compatible.
  #   stdio           — Process-local transport used by Claude Desktop's
  #                     per-machine MCP config. Use this only when you
  #                     specifically need Claude Desktop integration and
  #                     don't want to run an HTTP endpoint.
  transport: "streamable-http"

  # Port the HTTP listener binds to when transport is "streamable-http".
  # This is the knob that actually controls the bind port today (despite
  # the server.port field above) — change it if 3100 conflicts with
  # something else on your machine. Leave unset to default to 3100.
  port: 3100

  # HMAC-SHA256 signing key for bearer tokens issued on the /token endpoint.
  # Required for streamable-http. Kept in the root .env file; setup/setup.sh
  # generates it automatically. Never commit the actual secret.
  auth_secret: "${MCP_AUTH_SECRET}"

  # Token lifetime in hours. Bearer tokens issued by the /token endpoint
  # expire after this duration; refresh tokens live 7x longer.
  #   Development / local:   24 (the default — minimizes re-auth friction)
  #   Production:            1–4 (tighter blast radius on token leak)
  # Minimum enforced: 1 hour. Maximum allowed: 8760 hours (1 year).
  # No restart needed when changing this — new tokens use the updated value.
  # See README.md "Token Issuance Endpoint (POST /token)" for curl examples.
  token_lifetime: 24


# ─── Brokered MCP Servers ───────────────────────────────────────────────────
# External MCP servers that FlashQuery can broker to the host model and/or
# delegated call_model purposes. FlashQuery remains the intermediary; models
# never connect to these servers directly.
#
# This is different from the mcp: section above:
#   - mcp: configures FlashQuery's own MCP server.
#   - mcp_servers: configures upstream MCP servers FlashQuery can broker.
#
# v1 supports stdio MCP servers only. Servers are spawned lazily on first use
# and shared across all consumers that are allowed to see them.
#
# Uncomment and adapt these examples after installing the upstream MCP server
# packages and adding any required secrets to your .env file.

# mcp_servers:
#   brave_search:
#     transport: stdio
#     command: npx
#     args: ["-y", "@brave/brave-search-mcp-server", "--transport", "stdio"]
#     env:
#       BRAVE_API_KEY: "${BRAVE_API_KEY}"
#     # Optional default cost applied to every brokered tool call from this
#     # server unless overridden for a specific tool below.
#     cost_per_call: 0.005
#     tool_overrides:
#       brave_web_search:
#         # Replaces the upstream tool description everywhere FlashQuery
#         # presents the tool: host tools/list, delegated models, and
#         # search_tools results. TOFU schema pinning still hashes the
#         # original upstream schema.
#         description_override: "Search the public web for current information."
#         cost_per_call: 0.005


# ─── Host Tool Surface ──────────────────────────────────────────────────────
# Controls brokered MCP servers exposed to the host model over FlashQuery's
# own MCP surface. This is additive with host_mcp_tools, which controls
# FlashQuery-native tools. Empty or absent host: means no brokered tools are
# exposed to the host.
#
# In v1, mcp_servers lists whole upstream servers by ID. Per-tool subsetting
# is not supported; use mcp_servers.<server>.tool_overrides above to adjust
# descriptions and costs for individual brokered tools.
#
# Macros inherit the outer caller's surface. A macro called by the host sees
# host.mcp_servers; a macro called by a delegated purpose sees that purpose's
# mcp_servers.

# host:
#   mcp_servers:
#     - brave_search
#   tool_search: enabled



# ─── Locking ────────────────────────────────────────────────────────────────
# Coordinates concurrent writes across multiple FlashQuery instances that
# share a database. Cross-process coordination uses session-scoped Postgres
# advisory locks over DATABASE_URL, so leave this enabled unless you know this
# instance is the only writer for the vault. When disabled, FlashQuery keeps
# only same-process locking and skips the startup session-capability probe.

locking:
  enabled: true
  # Maximum time a contended document write waits to acquire its lock before
  # returning a conflict envelope with details.reason: "lock_timeout".
  # Default: 10.
  # lock_timeout_seconds: 10


# ─── Logging ────────────────────────────────────────────────────────────────

logging:
  level: "${LOG_LEVEL}"
  # Output destination: "stdout" (default, works with Docker log collection)
  # or "file" (requires uncommenting and setting the `file` path below).
  output: "stdout"
  # file: "./logs/flashquery.log"


# ─── Template Tool Exposure ─────────────────────────────────────────────────
# "Restrictive" mode exposes templates only to purposes that explicitly bind them
# with llm.purposes[].templates. This keeps non-language purposes such as
# embedding out of model-visible tool admission.  Otherwise, set the default_access
# to "Permissive" that allows any model to access templates.
#
# Host template tools expose eligible vault templates directly on FlashQuery's
# MCP tool surface as generated flashquery_<namespace>_<slug> tools. Leave
# host_access permissive to expose all eligible templates marked with
# fq_template: true and fq_expose_as_tool: true. Use restrictive mode with
# host_templates to expose only selected template files to host MCP clients.

templates:
  default_access: permissive
  # host_access: permissive
  # host_templates:
  #   - "Templates/Research-Skill.md"
  #   - "Templates/Source-Skill.md"


# ─── LLM (optional) ─────────────────────────────────────────────────────────
# Three-layer LLM config: providers + models + purposes.
# Entire section is OPTIONAL. Comment out or delete it to disable call_model,
# semantic search, model delegation, and LLM usage tracking.
#
# Providers answer "where do requests go?" They hold endpoint/API-key details
# for OpenAI-compatible services or Ollama.
#
# Models answer "what concrete model can FlashQuery call?" They are named
# aliases that point to a provider's underlying model ID, with type, cost, and
# optional capability metadata.
#
# Purposes answer "why are we calling a model?" They are stable workflow names
# with ordered model fallback chains, default parameters, and optional native
# tools/templates for delegated model runs.
#
# Naming rules: lowercase a-z 0-9 _ -, must start with [a-z0-9].
# Names are auto-lowercased at load time, so "Nano" and "nano" collide.
#
# NOTE: Embeddings for semantic search are defined in the top-level
# `embeddings:` catalog further down this file — NOT via an LLM purpose. 
# The `llm:` section below is for language / reasoning models used by call_model 
# and delegated purposes; omit it entirely to disable those features 
# (semantic search still works from the `embeddings:` catalog).

llm:
  # Providers are API endpoints/accounts. Use one provider per endpoint or
  # account boundary, then point models at them with provider_name.
  providers:
    - name: openai
      type: openai-compatible
      endpoint: https://api.openai.com
      api_key: ${OPENAI_API_KEY}
    - name: local-ollama
      type: ollama
      endpoint: ${OLLAMA_URL}
      local: true                       # marks provider as local — surfaced as `local: true` in list_models discovery
    # - name: openrouter
    #   type: openai-compatible
    #   endpoint: https://openrouter.ai/api
    #   api_key: ${OPENROUTER_API_KEY}

  # Models are FlashQuery aliases. Callers use these aliases with
  # resolver=model, and purposes use them in fallback chains. The `model`
  # field is the provider's real model ID.
  models:
    - name: fast
      provider_name: local-ollama
      model: granite4
      type: language
      cost_per_million:
        input: 0.0
        output: 0.00
      # Optional discovery metadata — surfaced via call_model resolver=list_models.
      # Omit any field to omit it from the discovery response.
      description: "Fast, cheap small model for routine tasks"
      context_window: 128000
      tags: ["cheap", "fast"]
      # Capabilities are used for discovery and for admitting tool/template
      # enabled purposes. Non-OpenAI-compatible providers should declare these
      # explicitly before exposing tools or templates through a purpose.
      capabilities:
        tool_calling: true
        usage_on_tool_calls: true
        strict_tools: true
        parallel_tool_calls: true
        structured_outputs_with_tools: true
    # - name: smart
    #   provider_name: openrouter
    #   model: anthropic/claude-opus-4-7
    #   type: reasoning
    #   cost_per_million:
    #     input: 15.00
    #     output: 75.00

  # Purposes are named calling policies. Prefer resolver=purpose for normal
  # workflows: purposes provide fallback, defaults, intent-based usage
  # reporting, and a controlled tool/template surface.
  purposes:
    - name: general
      description: |
        General-purpose language model for tasks that do not have a
        specialized purpose assigned. Used for testing, ad-hoc queries
        via call_model, and as the baseline model for new capabilities
        during development.
      models:
        - fast
    # - name: summarization
    #   description: |
    #     Produces concise summaries of documents for projections and
    #     downstream processing.
    #   models:
    #     - fast
    #   defaults:
    #     temperature: 0.3
    #     max_tokens: 1024
    #     response_format:
    #       type: json_object
    #     timeout_ms: 30000
    #     max_cost_usd: 0.25
    #     max_tokens_budget: 12000
    #     max_iterations: 5
    #     result_summary_chars: 2000
    #
    # - name: researcher
    #   description: |
    #     Delegated research loop with read-only vault access, brokered web
    #     search, and a purpose-bound template skill.
    #   models:
    #     - fast
    #   # tools expose FlashQuery-native MCP tools to the delegated model
    #   # inside a managed call_model loop. Use tiers or explicit tool names.
    #   tools:
    #     - tier:read-only
    #
    #   # Brokered MCP servers exposed to this delegated purpose. These IDs
    #   # must exist under the top-level mcp_servers map. Purposes do not
    #   # automatically inherit host.mcp_servers or other purposes' servers.
    #   mcp_servers:
    #     - brave_search
    #
    #   # When enabled, the delegated model starts with fq.search_tools rather
    #   # than receiving every eligible native and brokered tool up front.
    #   tool_search: enabled
    #
    #   # templates listed here are rendered as generated function/tool
    #   # definitions for the delegated model, not as top-level MCP tools.
    #   # The backing vault document must include frontmatter:
    #   #   fq_template: true
    #   #   fq_expose_as_tool: true
    #   #   fq_desc: "Description shown to the delegated model"
    #   #   fq_params: ...  # optional argument schema/template fields
    #   templates:
    #     - Templates/research-brief.md
    #
    # - name: vault_summarizer
    #   description: |
    #     Summarizes local vault material without access to brokered servers.
    #   models:
    #     - fast
    #   tools:
    #     - tier:read-only
    #   tool_search: disabled


# ─── Embedding Catalog ──────────────────────────────────────────────────────
# Native-width embedding entries used by semantic search and lifecycle
# maintenance actions:
#   maintain_vault({ action: "backfill_embeddings", embedding_name: "primary", ... })
#   maintain_vault({ action: "rebuild_embeddings", embedding_name: "primary", ... })
#   maintain_vault({ action: "retire_embedding", embedding_name: "primary", confirm: "primary" })
#
# `dimensions` sizes per-entry pgvector columns such as `embedding_primary`.
# It is never sent to provider APIs as a dimensions-reduction request parameter.
# Use this top-level catalog for new installs; do not create or depend on legacy
# singular `embedding` vector columns.

embeddings:
  - name: primary
    dimensions: 768
    endpoints:
      - provider_name: local-ollama
        model: nomic-embed-text
        rate_limit:
          min_delay_ms: 100

  # OpenAI native-width example:
  # - name: openai_small
  #   dimensions: 1536
  #   endpoints:
  #     - provider_name: openai
  #       model: text-embedding-3-small
