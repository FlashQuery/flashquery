name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the following details to help us understand and fix the issue.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Clear steps showing how to reproduce the bug
      placeholder: |
        1. Run the command `...`
        2. Create a document with ...
        3. Call the tool with ...
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The tool should return a list of documents
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (error message, unexpected output, etc.)
      placeholder: |
        Error: SUPABASE_URL is not set
        Stacktrace: ...
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version (e.g., macOS 14.2, Ubuntu 22.04, Windows 11)
      placeholder: "macOS 14.2"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help (config file, environment setup, recent changes, etc.)
      placeholder: |
        - Using Docker: yes/no
        - Supabase: local/cloud
        - CLI command: `fqc start`
        - Recently upgraded: yes/no
