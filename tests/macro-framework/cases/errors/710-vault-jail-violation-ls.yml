name: Errors — vault jail violation on `ls "../../etc"`
intent: |
  Errors — vault jail violation on `ls "../../etc"`
description: |
  A relative path that escapes the vault root via `..` MUST be refused by
  shell verbs with `forbidden_path / resolves_outside_vault` per REQ-042.
covers: [MTF-E-007]
golden_version: "0.3.0"
