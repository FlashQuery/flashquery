# Pilot — MTF-E-007: vault jail enforces on `ls` too.
#
# REQ-042 / OQ#25: macro shell verbs MUST refuse to resolve paths that
# escape the vault root via `..`. This pilot exercises the jail by issuing
# `ls "../../etc"` — a relative path that would escape the vault root.
# Production emits `forbidden_path / resolves_outside_vault`.
#
# Rewrite history (2026-05-20, GG-007 follow-up): the original macro used
# `ls "/etc"`, which does NOT exercise vault-jail. Absolute paths are
# reinterpreted as vault-relative, so `ls "/etc"` against an empty vault
# resolved to `<vault_root>/etc` — a missing path, producing
# `tool_call_failed / path_not_found`, not a jail violation. The current
# macro uses `..` escape to actually trigger the jail. The pilot's outcome
# terminology was also updated from the stale `fail` to the canonical
# `error` (per REQ-052 envelope shape).
