id: mtf-e-1411-filter-dynamic-bad-op
name: filter — dynamic bad operator (runtime)
intent: |
  §14.3.0 defer-if-dynamic: a $var operator that resolves to an invalid operator is caught at runtime.
description: |
  filter where $op is a variable bound to "~=". The preflight literal-operator
  check is skipped (operand is a VarRef), so the same fault as mtf-e-1410 surfaces
  at the runtime tier as tool_call_failed + filter_operator_invalid. This is the
  two-tier proof: same reason code, different envelope code. Graph-EDI §14.3.0.

covers:
  - MTF-S-200

golden_version: "0.4.0"
golden_run_at: 2026-06-22T00:00:00Z

deps: []
require_embedding: false
require_git: false

macro: |
  rows = [ { id: 1, stale: true } ]
  op = "~="
  bad = filter $rows "stale" $op true
  exit { result: $bad }

