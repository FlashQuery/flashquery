# Pilot 02 — MTF-S semantics: walk-up scope counter pattern
#
# Per Macro Language Requirements REQ-019: a `for`-loop body executes
# in a child environment; assignments to names declared in the OUTER
# scope walk up the parent chain and update the outer binding rather
# than shadowing it. The iterator variable itself shadows.

id: mtf-s-02-walk-up-scope-counter
name: Semantics — walk-up scope counter
description: |
  for-loop child env update of outer `total` + `n_iters` bindings.
  Verifies REQ-019 walk-up semantics: outer-declared vars are written
  through to the outer scope, while the loop variable shadows locally.

covers:
  - MTF-S-001   # walk-up scope on outer-declared var
  - MTF-S-002   # iterator var shadows
  - MTF-C-001   # for-loop over range
  - MTF-S-003   # arithmetic via add()

golden_version: "0.3.0"
golden_run_at: 2026-05-18T23:36:01.752Z

deps: []
require_embedding: false
require_git: false

macro: |
  total = 0
  n_iters = 0
  for i in 1..6 do
    total = add $total $i
    n_iters = add $n_iters 1
  done
  exit { total: $total, n_iters: $n_iters }

input_vars: {}
vault: {}
tools: {}

expect:
  outcome: success
  return_result:
    total: 15
    n_iters: 5
  trace_kinds_contain:
    - exit

