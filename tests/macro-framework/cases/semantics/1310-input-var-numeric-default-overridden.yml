# Pilot — MTF-L input_var: numeric --default overridden by a caller-supplied value
id: mtf-s-1310-input-var-numeric-default-overridden
name: input_var — numeric --default overridden, supplied value drives the computation
intent: |
  Confirm that when the caller supplies a value for an input the macro
  declared with a default, the supplied value — not the default — is what
  the macro computes with. A numeric input `budget` is declared with a
  default of 100; the caller supplies 250. The macro doubles it and exits
  with both figures, so the result distinguishes "used the supplied value"
  (doubled = 500) from "fell back to the default" (doubled = 200).
