  path: "/Macros/conditional-required.md"
  frontmatter:
    mode: "shallow"
  title: "Conditional Required"
  tags: []
  fq_id: "fq:doc:cond-req:001"

macro: |
  mode = $_self.frontmatter.mode
  if $mode == "deep" then
    detail = input_var "detail"
    exit { mode: $mode, detail: $detail }
  fi
  exit { mode: $mode, detail: null }

