id: mtf-s-999-input-var-in-untaken-branch-still-required
name: input_var inside an untaken branch is still required by pre-flight
intent: |
  Macro has an if-branch containing a required input_var. At runtime
  the branch wouldn't execute, but per REQ-007 ac3 pre-flight walks
  the ENTIRE AST. The input_var must still be supplied.
description: |
  REQ-007 ac3 — "The pre-flight scan MUST walk the entire AST." Pre-flight
  runs BEFORE any statement executes, so it can't know which branches
  will be taken at runtime. Pilot does NOT supply the required input_var
  → invalid_input even though the branch never runs.

covers:
  - MTF-L-002
  - MTF-E-008

golden_version: "0.3.0"
golden_run_at: 2026-05-19T22:30:00Z

deps: []
require_embedding: false
require_git: false

