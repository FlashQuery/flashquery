id: mtf-s-996-input-var-in-comparison-precomputed
name: input_var value in comparison (pre-computed pattern)
intent: |
  Read a numeric input_var, bind to a variable, then compare against
  a literal. Tests the §1.2 grammar-boundary idiom — pipelines must
  be pre-computed before composing with comparison operators.
description: |
  Exercises the pre-computation idiom landed in macro-spec.md §1.2
  (Comparison grammar boundary). The input_var pipeline is bound to
  a variable first, then the comparison uses the variable.

covers:
  - MTF-L-002
  - MTF-C-009
  - MTF-N-005

