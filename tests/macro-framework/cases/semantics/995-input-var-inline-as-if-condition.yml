id: mtf-s-995-input-var-inline-as-if-condition
name: input_var used inline as if-condition (no intermediate binding)
intent: |
  Use input_var directly as the condition of an if statement, without
  assigning to a variable first. Tests that builtins (pipelines) are
  valid expression positions for if-conditions.
description: |
  REQ-007 + spec §5.2 (builtins/pipelines valid in any expression
  position). The condition is the result of the input_var pipeline.

covers:
  - MTF-L-002
  - MTF-C-009

golden_version: "0.3.0"
golden_run_at: 2026-05-19T22:30:00Z

deps: []
require_embedding: false
require_git: false

macro: |
  if input_var "enabled" --default false then
    result = "on"
  else
    result = "off"
  fi
  exit { result: $result }

input_vars:
  enabled: true
