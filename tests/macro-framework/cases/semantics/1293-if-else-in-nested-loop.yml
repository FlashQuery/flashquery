id: mtf-s-1293-if-else-in-nested-loop
name: Control flow — if/then/else/fi inside a nested loop
intent: |
  An if/else inside a nested loop classifies each (i,j) pair as a diagonal hit or an off-diagonal miss.

covers:
  - MTF-C-008
  - MTF-C-007
  - MTF-S-006
  - MTF-S-008
  - MTF-S-003
  - MTF-G-005

golden_version: "0.3.0"
golden_run_at: 2026-05-20T17:30:00Z

deps: []
require_embedding: false
require_git: false

macro: |
  # classify each cell of a nested loop via if/else
  hits = 0
  misses = 0
  for i in 1..4 do
    for j in 1..4 do
      same = sub $i $j
      if $same then
        misses = add $misses 1
      else
        hits = add $hits 1
      fi
    done
  done
  exit { hits: $hits, misses: $misses }

