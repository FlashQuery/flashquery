# Pilot 04 — MTF-C control flow: while-loop with fail
#
# while-loop runs until an internal if-fail aborts at counter==7.
# Tests REQ-015 (while-loop) + REQ-024 ac3 (fail-on-condition).

id: mtf-c-04-while-with-fail
name: Control flow — while-loop with fail
description: |
  while-loop iterates `counter` from 0 upward; an `if $counter == 7`
  fail aborts after 7 iterations. Verifies while-loop semantics and
  fail termination from within a while body.

covers:
  - MTF-C-005   # while-loop iteration
  - MTF-C-006   # while-loop with fail termination
  - MTF-S-004   # outer-scope counter mutation under while

golden_version: "0.3.0"
golden_run_at: 2026-05-18T23:36:01.752Z

deps: []
require_embedding: false
require_git: false

macro: |
  counter = 0
  while $counter < 100 do
    counter = add $counter 1
    if $counter == 7 then
      fail "halt while at 7"
    fi
  done
  echo "unreachable"

input_vars: {}
vault: {}
tools: {}

expect:
  outcome: fail
  error:
    code: macro_aborted
    message_contains: "halt while at 7"

