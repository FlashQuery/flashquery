# Pilot — MTF-C control flow: while-loop aborted by fail() with an interpolated message
id: mtf-c-1311-while-fail-interpolated-message
name: while-loop — fail() terminates the loop with a runtime-interpolated message
intent: |
  A while-loop accumulates a running total each iteration and aborts the
  moment the total crosses a ceiling. The abort message must name the
  offending total, so this exercises $-interpolation inside a fail()
  string. The total climbs 0 → 30 → 60 → 90 → 120; at 120 it crosses the
  100 ceiling and the macro aborts with a macro_aborted envelope whose
  message reads "budget exceeded at 120". The trailing echo never runs.
