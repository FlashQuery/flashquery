# Pilot 12 — ELABORATE BEYOND REALISTIC: 3-deep nested for-loops
#
# Per §5.4 + §9.5 constraint 6: "tests may be more elaborate than
# realistic user behavior." This macro chains three for-loops 4-deep
# (1..5 exclusive = [1,2,3,4]), each iteration appending a triple and
# accumulating a running sum across all 64 iterations. No real user
# would write this — but it stress-tests the engine's nested-loop +
# walk-up-scope + multi-arg-arithmetic surfaces in one shot.
#
# Produces 4*4*4 = 64 triples and total_indices = 480 (sum of all
# (i+j+k) across 64 iterations; mean ((1+2+3+4)/4)=2.5 per coord,
# 64*7.5=480).
#
# Satisfies the brief's "at least one elaborate-beyond-realistic"
# diversity requirement (§9.5 constraint 6).
#
# Embedded snapshot has 514 state_notes; the YAML
# is intentionally large per the brief's note about coverage being
# additive (INV-MTF-05).

id: mtf-l-12-elaborate-deep-nesting
name: Elaborate — 3-deep nested for-loops with running sum
description: |
  Stress-test for the engine's nested-loop + walk-up-scope +
  multi-positional-arithmetic interaction. 64 inner iterations across
  three nested for-loops; each iteration appends a triple to acc and
  accumulates a running sum of indices.

covers:
  - MTF-L-007   # deeply nested for-loops
  - MTF-S-005   # multi-positional add() across three values
  - MTF-S-006   # walk-up scope under nested loops
  - MTF-C-007   # nested for-loop iteration counting

golden_version: "0.3.0"
golden_run_at: 2026-05-18T23:36:01.752Z

deps: []
require_embedding: false
require_git: false

macro: |
  acc = []
  total_indices = 0
  for i in 1..5 do
    for j in 1..5 do
      for k in 1..5 do
        acc = append $acc [$i, $j, $k]
        total_indices = add $total_indices $i $j $k
      done
    done
  done
  n_triples = count $acc
  exit { n_triples: $n_triples, sum_indices: $total_indices }

input_vars: {}
vault: {}
tools: {}

expect:
  outcome: success
  return_result:
    n_triples: 64
    sum_indices: 480

