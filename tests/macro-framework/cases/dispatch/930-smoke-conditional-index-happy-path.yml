id: mtf-d-930-smoke-conditional-index-happy-path
name: Smoke — conditional indexing (happy path; published && !archived → index)
intent: |
  A macro that processes a single document from frontmatter. The
  document path is at _self.frontmatter.target_doc. The macro calls
  doc_srv.fetch({ path: $target_doc }) to get the document. It applies
  this rule: process the document ONLY IF the document has a
  'published' field that is true AND its 'archived' field is null. If
  either condition fails, skip with { skipped: true, reason: <why> }
  where <why> says which condition failed. If both conditions pass,
  call index_srv.add({ doc: $doc }) to index it, then exit with
  { indexed: true, doc_id: $doc.id }.
description: |
  Happy-path variant: target document is published and not archived.
  Macro indexes it and exits with `indexed: true`.

  Exercises:
  - _self.frontmatter access (REQ-103)
  - Brokered call with JSON-coerced result (REQ-106)
  - Truthiness with `!` negation operator (REQ-022)
  - `!= null` comparison guard (REQ-112d composability)
  - Compound conditional logic via early-exit guards
  - Two distinct brokered server references (§11.1)
  - Object literal exit with non-reserved keys (REQ-024)

covers:
  - MTF-I-101   # _self.frontmatter
  - MTF-D-101   # brokered coercion
  - MTF-S-007   # field access
  - MTF-C-009   # exit structured

golden_version: "0.3.0"
golden_run_at: 2026-05-19T19:00:00Z

deps: []
require_embedding: false
require_git: false

self_binding:
  path: "/Macros/conditional-index.md"
  frontmatter:
    target_doc: "/docs/article-001.md"
  title: "Conditional Index"
  tags: []
  fq_id: "fq:doc:cond-index:001"

macro: |
  target_doc = $_self.frontmatter.target_doc
  doc = doc_srv.fetch({ path: $target_doc })

  if ! $doc.published then
    exit { skipped: true, reason: "doc is not published" }
  fi
  if $doc.archived != null then
    exit { skipped: true, reason: "doc is archived" }
  fi

  index_srv.add({ doc: $doc })
  exit { indexed: true, doc_id: $doc.id }

input_vars: {}
vault: {}

tools:
  doc_srv:
    archetype: JSONTextTool
    tool_name: fetch
    value:
      id: "doc-001"
      published: true
      archived: null
      title: "Article 001"
  index_srv:
    archetype: JSONTextTool
    tool_name: add
    value: { ok: true }

