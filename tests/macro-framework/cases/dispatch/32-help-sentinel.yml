# Pilot 32 — Macro grammar accepts boolean literals in object literals.
#
# REPURPOSED 2026-05-19. Previously this pilot tried to verify Broker
# REQ-093 / REQ-098 (`help: true` sentinel forwarding) by calling a
# brokered tool with `help: true` from inside a macro. That path was
# never in scope for the macro test surface — REQ-098 explicitly scopes
# the behavior to "a delegated or host model" calling the brokered tool,
# not a macro frame. Verification of REQ-093 / REQ-098 belongs at the
# broker layer (unit + delegated-call scenario).
#
# Updated 2026-05-19 for Broker REQ-112c: boolean literals (`true` /
# `false`) are now first-class macro values. This pilot therefore verifies
# that a boolean in an object literal reaches the brokered call instead of
# being treated as an unknown builtin.

