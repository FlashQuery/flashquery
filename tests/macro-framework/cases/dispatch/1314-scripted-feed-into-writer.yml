# Pilot — MTF-D dispatch: a scripted feed server drives a writer server
id: mtf-d-1314-scripted-feed-into-writer
name: Multi-server dispatch — scripted feed pulled twice, then handed to a writer
intent: |
  Pull two successive items from a scripted feed server — the same tool
  called twice returns a different payload each time — then hand both
  values to a separate writer server and confirm the write succeeded. This
  exercises a two-server chain where one server's per-call sequencing feeds
  the other: the macro pulls stage "alpha" then stage "beta", writes their
  values, and exits carrying both stage labels plus the writer's ok flag.
