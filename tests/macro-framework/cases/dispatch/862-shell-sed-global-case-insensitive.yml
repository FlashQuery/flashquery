name: Dispatch — `sed s/old/new/gi` is global and case-insensitive
intent: |
  Combined `gi` flags do both: every match per line, case-insensitive.
description: |
  Per REQ-038 §6.5.1, `sed "s/<old>/<new>/gi" <file>` replaces every
  case-insensitive match. A file with "Apple\napple\nAPPLE" rewrites all
  three lines to "PEAR" when matching with `gi`.
