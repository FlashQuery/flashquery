# Pilot 06 — MTF-D dispatch + brokered: ScriptedTool exercising three
# CallToolResult coercion paths in sequence (REQ-106 paths 2, 3, 4).
#
# Satisfies the brief's "at least one brokered-tool archetype fake"
# diversity requirement (§9.5 constraint 3).

id: mtf-d-06-brokered-coercion-paths
name: Dispatch — ScriptedTool exercising coercion paths 2/3/4
description: |
  ScriptedTool returns three different CallToolResult shapes on three
  successive calls. The macro binds each result and exits with all
  three bindings.

covers:
  - MTF-D-005   # CallToolResult coercion path 2 (structuredContent)
  - MTF-D-006   # CallToolResult coercion path 3 (JSON text)
  - MTF-D-007   # CallToolResult coercion path 4 (raw string)
  - MTF-D-008   # ScriptedTool archetype (§5.7)

golden_version: "0.3.0"
golden_run_at: 2026-05-18T23:36:01.752Z

deps: []
require_embedding: false
require_git: false

macro: |
  v1 = coerce_srv.shape({})
  v2 = coerce_srv.shape({})
  v3 = coerce_srv.shape({})
  exit { struct: $v1, json: $v2, raw: $v3 }

input_vars: {}
vault: {}

tools:
  coerce_srv:
    archetype: ScriptedTool
    tool_name: shape
    responses:
      # Call 1: structuredContent populated → REQ-106 path 2 (structured)
      - content: [{ type: text, text: '{"source":"structured","n":1}' }]
        structuredContent: { source: "structured", n: 1 }
      # Call 2: text content parseable as JSON → REQ-106 path 3 (json_text)
      - content: [{ type: text, text: '{"source":"json","n":2}' }]
      # Call 3: text content NOT parseable as JSON → REQ-106 path 4 (raw_string)
      - content: [{ type: text, text: "plain raw text response 3" }]

expect:
  outcome: success
  return_result:
    struct: { source: "structured", n: 1 }
    json: { source: "json", n: 2 }
    raw: "plain raw text response 3"
  side_effects:
    tool_call_count: 3

golden_snapshot:
  state_notes:
    - { kind: permission, tool: "coerce_srv.shape", decision: allowed }
    - { kind: ast, node_kind: assignment, line: 2, column: 0 }
    - { kind: coerce, path: structured_content, raw_summary: "coerce_srv.shape bound via structured_content" }
    - { kind: budget, tokens: 0, model_calls: 0, external_tool_calls: 1, elapsed_ms: 0 }
    - { kind: binding, op: set, name: v1, value: { source: "structured", n: 1 }, scope: local }
    - { kind: ast, node_kind: assignment, line: 3, column: 0 }
    - { kind: coerce, path: json_text, raw_summary: "coerce_srv.shape bound via json_text" }
    - { kind: budget, tokens: 0, model_calls: 0, external_tool_calls: 2, elapsed_ms: 0 }
    - { kind: binding, op: set, name: v2, value: { source: "json", n: 2 }, scope: local }
    - { kind: ast, node_kind: assignment, line: 4, column: 0 }
    - { kind: coerce, path: raw_string, raw_summary: "coerce_srv.shape bound via raw_string" }
    - { kind: budget, tokens: 0, model_calls: 0, external_tool_calls: 3, elapsed_ms: 0 }
    - { kind: binding, op: set, name: v3, value: "plain raw text response 3", scope: local }
