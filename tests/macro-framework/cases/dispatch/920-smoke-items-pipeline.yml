id: mtf-d-920-smoke-items-pipeline
name: Smoke — items pipeline (multi-step composition with per-item dispatch + aggregation)
intent: |
  A macro that has a list of items in the document's frontmatter under
  `items`. For each item, call processor_srv.process({ item: $item }).
  The tool returns a structured value with a `status` field that's
  either "done" or "deferred". Collect items where status was "done"
  into a list, and items where status was "deferred" into another
  list. Return a summary object showing both lists and a count for
  each.
description: |
  Generated via `flashquery-macro-author` from the `intent:` above
