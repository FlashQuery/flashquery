  frontmatter read, per-item brokered tool dispatch, field access on
  the coerced result, conditional branching, walk-up accumulation,
  and structured exit.

covers:
  - MTF-I-101   # _self.frontmatter access
  - MTF-S-001   # walk-up scope assignment
  - MTF-C-001   # for-loop iteration over a list
  - MTF-D-101   # brokered tool coercion
