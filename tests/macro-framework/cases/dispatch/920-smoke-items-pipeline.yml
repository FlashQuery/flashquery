golden_version: "0.3.0"
golden_run_at: 2026-05-19T18:30:00Z

deps: []
require_embedding: false
require_git: false

self_binding:
  path: "/Macros/items-pipeline.md"
  frontmatter:
    items: ["alpha", "beta", "gamma"]
  title: "Items Pipeline"
  tags: []
  fq_id: "fq:doc:items-pipeline:001"

macro: |
  done_items = []
  deferred_items = []

  for item in $_self.frontmatter.items do
    result = processor_srv.process({ item: $item })
    if $result.status == "done" then
      done_items = append $done_items $item
    else
      deferred_items = append $deferred_items $item
    fi
  done

  exit {
    completed: $done_items,
    deferred: $deferred_items,
    completed_count: count $done_items,
    deferred_count: count $deferred_items
  }

input_vars: {}
vault: {}

tools:
  processor_srv:
    archetype: ScriptedTool
    tool_name: process
    responses:
      - { content: [{ type: "text", text: '{"status":"done"}' }] }
      - { content: [{ type: "text", text: '{"status":"deferred"}' }] }
      - { content: [{ type: "text", text: '{"status":"done"}' }] }

