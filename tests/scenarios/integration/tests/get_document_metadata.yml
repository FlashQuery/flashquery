name: get_document_metadata
description: >
  When retrieving a document's metadata, all expected fields are present:
  title, path, tags, status, and fqc_id. get_doc_outline returns frontmatter
  fields including fq_title (value), fq_status, fq_tags, and fq_id. search_documents
  returns Title, Path, and FQC ID in the result listing. Body content is
  verified via get_document. Covers IX-07: all named metadata fields are
  accessible through the FlashQuery retrieval surface.
coverage: [IX-07]

steps:
  - label: "Write a document with tags and metadata"
    action: vault.write
    name: meta_doc
    path: "knowledge/concepts.md"
    title: "Core Concepts"
    content: "Key concepts for understanding the system."
    tags: [knowledge, concepts, gdm-tag]

  - label: "get_doc_outline returns title value in frontmatter"
    assert:
      op: get_doc_outline
      args:
        identifiers: "${meta_doc.fq_id}"
      expect_contains: "Core Concepts"

  - label: "get_doc_outline returns fq_status field name in frontmatter"
    assert:
      op: get_doc_outline
      args:
        identifiers: "${meta_doc.fq_id}"
      expect_contains: "fq_status"

  - label: "get_doc_outline returns fq_id field name in frontmatter"
    assert:
      op: get_doc_outline
      args:
        identifiers: "${meta_doc.fq_id}"
      expect_contains: "fq_id"

  - label: "get_doc_outline returns tag value in frontmatter"
    assert:
      op: get_doc_outline
      args:
        identifiers: "${meta_doc.fq_id}"
      expect_contains: "gdm-tag"

  - label: "search_documents returns Title, Path, and FQC ID in result"
    assert:
      op: search_documents
      args:
        tags: [gdm-tag]
      expect_contains: "Core Concepts"
      expect_path_contains: "knowledge/concepts.md"

  - label: "get_document returns body content"
    assert:
      op: get_document
      args:
        identifier: "${meta_doc.fq_id}"
      expect_contains: "Key concepts for understanding the system"
