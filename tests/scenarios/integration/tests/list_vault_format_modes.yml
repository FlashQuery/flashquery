name: list_vault_format_modes
description: >
  create_directory creates a test directory. list_vault default and include modes return
  the same structured JSON envelope, with metadata adding created and children fields.
  Covers IF-15.
coverage: [IF-15]

steps:
  - label: "Create a test directory for IF-15"
    action: create_directory
    args:
      paths: "_integration/if15/test-dir"

  - label: "list_vault default mode returns structured entries (IF-15)"
    assert:
      op: list_vault
      args:
        path: "_integration/if15"
        show: "directories"
      expect_json_path:
        - "path"
        - "entries[0].path"
        - "entries[0].size.entries"

  - label: "list_vault default mode shows test-dir entry (IF-15)"
    assert:
      op: list_vault
      args:
        path: "_integration/if15"
        show: "directories"
      expect_json_equals:
        path: "entries[0].path"
        value: "_integration/if15/test-dir"

  - label: "list_vault metadata include exposes directory children count (IF-15)"
    assert:
      op: list_vault
      args:
        path: "_integration/if15"
        show: "directories"
        include: ["metadata"]
      expect_json_equals:
        path: "entries[0].children"
        value: 0

  - label: "list_vault metadata include exposes created timestamp (IF-15)"
    assert:
      op: list_vault
      args:
        path: "_integration/if15"
        show: "directories"
        include: ["metadata"]
      expect_json_path: "entries[0].created"
