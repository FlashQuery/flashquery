name: llm_call_model_basic
description: >
  End-to-end call_model with resolver: model returns a valid response envelope
  with metadata.resolver == "model", metadata.fallback_position == null, and
  non-empty response text. Verifies TOOL-01, TOOL-02 for the model resolver path
  end-to-end through the integration test runner.
coverage: [IL-01]

extra_config:
  llm:
    providers:
      - name: openai
        type: openai-compatible
        endpoint: "https://api.openai.com"
        api_key: "${OPENAI_API_KEY}"
    models:
      - name: fast
        provider_name: openai
        model: "gpt-4o-mini"
        type: language
        cost_per_million:
          input: 0.15
          output: 0.6
    purposes:
      - name: general
        description: "General purpose"
        models: [fast]
        defaults:
          temperature: 0.7

steps:
  - label: "call_model resolver=model returns response containing '4'"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "What is 2+2? Reply with just the digit."
      expect_contains: "4"
