name: plugin_record_consolidation
description: >
  Phase 126 plugin and record final public contracts are validated by the
  dedicated unit, integration, E2E, and directed scenario gates. This scenario
  keeps a lightweight live assertion for the final pending-review action contract.
coverage: [IR-14, IR-15, IR-16]

steps:
  - label: "Pending review list action returns the final JSON envelope"
    assert:
      op: clear_pending_reviews
      args:
        action: list
        plugin_id: phase126-empty
      expect_json_equals:
        path: pending
        value: 0
      expect_json_array_length:
        path: items
        equals: 0
