name: append_and_search
description: >
  When content is appended to a document via append_to_doc, the document
  remains immediately discoverable in search_documents without requiring a
  separate scan or index step. Verifies that append mutations do not break
  the document's search visibility, and that the appended content is
  durably stored and readable via get_document. Covers IC-04: search reflects
  append immediately, and the appended text is readable via get_document.
coverage: [IC-04]

steps:
  - label: "Write a document with initial content"
    action: vault.write
    name: log_doc
    path: "logs/activity.md"
    title: "Activity Log"
    content: "Initial log entry at session start."
    tags: [logs, aas-tag]

  - label: "Initial content is searchable"
    assert:
      op: search_documents
      args:
        query: "Activity Log"
      expect_contains: "Activity Log"

  - label: "Append new entry to the document"
    action: append_to_doc
    args:
      identifier: "${log_doc.fq_id}"
      content: "\nNew event: User logged in from 192.168.1.100"

  - label: "Document is findable by title immediately after append — no scan step needed"
    assert:
      op: search_documents
      args:
        query: "Activity Log"
      expect_contains: "Activity Log"

  - label: "Appended content is readable via get_document"
    assert:
      op: get_document
      args:
        identifier: "${log_doc.fq_id}"
      expect_contains: "New event: User logged in"

  - label: "Original content still present after append"
    assert:
      op: get_document
      args:
        identifier: "${log_doc.fq_id}"
      expect_contains: "Initial log entry"

  - label: "Retrieve document: original content preserved"
    assert:
      op: get_document
      args:
        identifier: "${log_doc.fq_id}"
      expect_contains: "Initial log entry at session start."

  - label: "Retrieve document: appended entry is present"
    assert:
      op: get_document
      args:
        identifier: "${log_doc.fq_id}"
      expect_contains: "New event: User logged in from 192.168.1.100"
