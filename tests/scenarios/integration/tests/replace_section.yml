name: replace_section
description: >
  A document can be updated to replace its content section entirely. After replacement,
  the document remains discoverable by title and the current body reflects the replacement.
  Verifies that content mutation via write_document is reflected in direct document reads
  without relying on semantic search cardinality for literal body-text absence.
coverage: [IC-03]

steps:
  - label: "Write a document with initial content"
    action: vault.write
    name: draft_doc
    path: "drafts/proposal.md"
    title: "Project Proposal"
    content: "This proposal outlines the old approach to solving the infrastructure challenge."
    tags: [drafts, proposal, rep-tag]

  - label: "Original title is findable by search_all"
    assert:
      op: search
      args:
        query: "Project Proposal"
      expect_path: "drafts/proposal.md"

  - label: "Replace the document content with new text"
    action: write_document
    args:
      mode: update
      identifier: "${draft_doc.fq_id}"
      content: "This proposal outlines the new approach using cloud-native architecture with microservices."

  - label: "Scan vault to index updated content"
    action: scan_vault

  - label: "Document title still findable after update"
    assert:
      op: search
      args:
        query: "Project Proposal"
      expect_path: "drafts/proposal.md"

  - label: "New content is readable via get_document"
    assert:
      op: get_document
      args:
        identifiers: "${draft_doc.fq_id}"
      expect_contains: "microservices"

  - label: "Old content is not returned by get_document"
    assert:
      op: get_document
      args:
        identifiers: "${draft_doc.fq_id}"
      expect_not_contains: "old approach"
