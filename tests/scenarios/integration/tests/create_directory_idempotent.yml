name: create_directory_idempotent
description: >
  Calling create_directory twice with the same path is idempotent: the second call
  does not return an error and does not create duplicate directory entries. Verified
  by checking that list_vault shows the directory exactly once (no duplicated name).
  Covers IF-07.
coverage: [IF-07]

steps:
  - label: "Create directory for IF-07 (first call)"
    action: create_directory
    args:
      paths: "_integration/if07/repeated-dir"

  - label: "Create same directory again (second call — must not error)"
    action: create_directory
    args:
      paths: "_integration/if07/repeated-dir"

  - label: "list_vault shows directory appears (IF-07)"
    assert:
      op: list_vault
      args:
        path: "_integration/if07"
        show: "directories"
      expect_contains: "repeated-dir/"

  - label: "list_vault response does not contain a doubled directory name (IF-07)"
    assert:
      op: list_vault
      args:
        path: "_integration/if07"
        show: "directories"
      expect_not_contains: "repeated-dir/repeated-dir/"
