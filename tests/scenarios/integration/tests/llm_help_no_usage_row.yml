name: llm_help_no_usage_row
description: >
  IL-41: the help resolver participates in the no-usage-row contract. call_model
  with resolver=help is a discovery resolver — it short-circuits before any LLM
  dispatch (src/mcp/tools/llm.ts:347) and must not write a fqc_llm_usage row.
  Generalizes IL-22 (unresolved {{ref:...}} → no row) to the help resolver path.

  Two assertions: (1) call_model resolver=help returns a recognizable help body
  (asserted via the stable top-level "reference_syntax" key from
  src/llm/help-content.ts), (2) get_llm_usage(period=all) reports total_calls=0
  for the help call's unique trace_id — proving help did not write a row. The
  trace-scoped assertion keeps the test valid against persistent external
  servers that may have usage rows from earlier tests.
coverage: [IL-41]

steps:
  - label: "IL-41 step 1: call_model resolver=help returns help body without name or messages (DISC-04 — help is a discovery resolver)"
    # Help is a no-LLM-dispatch resolver. Per src/mcp/tools/llm.ts:301 and
    # DISC-04, name and messages are optional for discovery resolvers. The
    # response body is structured help content from buildCallModelHelpContent
    # in src/llm/help-content.ts; "reference_syntax" is a stable top-level
    # key in that JSON shape and uniquely identifies a help response (it does
    # not appear in list_purposes/list_models/search shapes).
    assert:
      op: call_model
      args:
        resolver: help
        trace_id: "il41-${run.id}"
      expect_contains: '"reference_syntax"'
      expect_not_contains: '"isError":true'

  - label: "IL-41 step 2: help body includes the resolvers contract (proves a real help response, not an empty/stub)"
    # Anchor a second stable substring to defend against a stub help response
    # that happens to include the word reference_syntax in some other context.
    # "raw_discovery_resolvers" is built into summary by buildSummary() in
    # src/llm/help-content.ts:43 and is a help-only structural marker.
    assert:
      op: call_model
      args:
        resolver: help
        trace_id: "il41-${run.id}"
      expect_contains: '"raw_discovery_resolvers"'

  - label: "IL-41 step 3: get_llm_usage(period=all, trace_id) reports total_calls=0 — help wrote no fqc_llm_usage row"
    # The trace_id filter scopes the assertion to this test's help calls so the
    # check works against both fresh managed servers and persistent external
    # servers that may already contain LLM usage rows.
    assert:
      op: get_llm_usage
      args:
        mode: summary
        period: all
        trace_id: "il41-${run.id}"
      expect_contains: '"total_calls": 0'

  - label: "IL-41 step 4: get_llm_usage(mode=recent, period=all, trace_id) returns no model_name entries — no row to surface"
    # Cross-check: recent mode would expose any row written with this trace_id,
    # even one not counted by summary.
    assert:
      op: get_llm_usage
      args:
        mode: recent
        period: all
        trace_id: "il41-${run.id}"
      expect_not_contains: '"model_name"'
