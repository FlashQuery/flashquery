name: list_vault_table_file_size
description: >
  create_directory creates a directory, then vault.write creates a document inside it.
  list_vault(show: "files") returns structured JSON entries with size.chars for the
  created document. Covers IF-16.
coverage: [IF-16]

steps:
  - label: "Create a directory for IF-16"
    action: manage_directory
    args:
      action: create
      paths: "_integration/if16/docs"

  - label: "Write a document in the new directory for IF-16"
    action: vault.write
    name: if16_doc
    path: "if16/docs/note.md"
    title: "IF-16 File Size Note"
    content: "Document for verifying file size column in list_vault table format."
    tags: [if16-tag]

  - label: "list_vault(show: files) returns entries array (IF-16)"
    assert:
      op: list_vault
      args:
        path: "_integration/if16/docs"
        show: "files"
      expect_json_path: "entries"

  - label: "list_vault(show: files) shows note.md file entry (IF-16)"
    assert:
      op: list_vault
      args:
        path: "_integration/if16/docs"
        show: "files"
      expect_json_equals:
        path: "entries[0].path"
        value: "_integration/if16/docs/note.md"

  - label: "list_vault(show: files) shows size.chars for the file (IF-16)"
    assert:
      op: list_vault
      args:
        path: "_integration/if16/docs"
        show: "files"
      expect_json_path: "entries[0].size.chars"
