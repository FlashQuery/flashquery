name: macro_extensions_compose_rundoc
description: >
  T-Y-015 / INT-MCB-15: source_ref rundoc execution composes _self metadata,
  continue, break, and brokered _exists() in one macro workflow.
coverage: [INT-MCB-15]
server_modes: [managed]

extra_config:
  host_mcp_tools:
    tools:
      - call_macro
      - write_document
      - get_document
      - archive_document
  mcp_servers:
    basic:
      transport: stdio
      command: node
      args: ["--import", "tsx", "tests/fixtures/mcp-servers/server-basic.ts"]
      cost_per_call: 0.125
      per_call_timeout_ms: 30000
      tool_overrides: {}
  host:
    mcp_servers: [basic]
    tool_search: disabled

steps:
  - label: "Create Phase E rundoc macro library"
    action: vault.write
    name: phase_e_rundoc
    path: "phase-e/rundoc-${run.id}.md"
    title: "Phase E Rundoc ${run.id}"
    content: |
      ```fqm name=compose
      completed = []
      skipped = []
      for target in _self.frontmatter.targets do
        if $target == "missing" then
          if !missing_phase_e_yaml._exists() then
            skipped = append $skipped $target
            continue
          fi
        fi
        if !basic._exists() then
          continue
        fi
        if $target == "stop" then
          break
        fi
        completed = append $completed $target
      done
      fq.write_document({
        mode: "update",
        identifier: _self.path,
        frontmatter: { completed: $completed, skipped: $skipped }
      })
      exit { path: _self.path, marker: _self.frontmatter.phase_e_marker, completed: $completed, skipped: $skipped }
      ```
    tags: [phase-e, rundoc]
    frontmatter:
      type: macro_library
      phase_e_marker: "yaml-${run.id}"
      targets: ["alpha", "missing", "beta", "stop", "late"]
      completed: []

  - label: "INT-MCB-15 / T-Y-015: source_ref rundoc composes _self, continue, break, and _exists"
    assert:
      op: call_macro
      args:
        source_ref: "${phase_e_rundoc.path}::compose"
        trace: summary
      expect_json_equals:
        path: result.marker
        value: "yaml-${run.id}"
      expect_json_contains:
        path: result.completed
        value: alpha
      expect_json_path:
        - result.path
        - result.skipped

  - label: "INT-MCB-15 / T-Y-015: rundoc write-back persisted completed frontmatter"
    assert:
      op: get_document
      args:
        identifiers: "${phase_e_rundoc.path}"
        include: ["frontmatter"]
      expect_json_equals:
        path: frontmatter.completed[1]
        value: beta
      expect_json_contains:
        path: frontmatter.skipped
        value: missing
