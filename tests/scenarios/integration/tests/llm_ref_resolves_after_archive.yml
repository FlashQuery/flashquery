name: llm_ref_resolves_after_archive
description: >
  Archiving a document does not break reference resolution. After
  vault.write + archive_document, call_model {{ref:doc.md}} still resolves
  the body successfully and the response metadata reports a positive
  injected_references[].chars value reflecting the archived document's body
  (IX-14).
coverage: [IX-14]
deps: [llm]

steps:
  - label: "Setup: write document with a known token (HIDDEN-TREASURE)"
    action: vault.write
    name: archived_ref_doc
    path: "Test/ref-archived.md"
    title: "Ref Archived"
    content: "The archived secret is HIDDEN-TREASURE."
    tags: [ix14-tag]

  - label: "Archive the document and assert JSON archive lifecycle output"
    assert:
      op: archive_document
      args:
        identifiers: "${archived_ref_doc.fq_id}"
      expect_json_equals:
        path: "status"
        value: "archived"
      expect_json_path: "archived_at"

  - label: "call_model {{ref:doc.md}} on archived document still resolves and LLM sees the body"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "{{ref:_integration/Test/ref-archived.md}} What is the archived secret? Reply with just the secret."
      expect_contains: "HIDDEN-TREASURE"

  - label: "Response metadata still includes injected_references[] for the archived doc"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "{{ref:_integration/Test/ref-archived.md}} Reply OK."
      expect_contains: '"injected_references"'

  - label: "Response metadata still includes prompt_chars (resolution succeeded, prompt was assembled)"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "{{ref:_integration/Test/ref-archived.md}} Reply OK."
      expect_contains: '"prompt_chars"'

  - label: "injected_references[] entry carries the archived body char count"
    # IX-14 requires that metadata reports the correct chars for the injected
    # archived doc. Vault serialization stores this body with a trailing newline,
    # so the injected content length is 40 chars.
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "{{ref:_integration/Test/ref-archived.md}} Reply OK."
      expect_json_equals:
        path: "metadata.injected_references[0].chars"
        value: 40

  - label: "Response is not an error — archive must not surface as reference_resolution_failed"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        messages:
          - role: user
            content: "{{ref:_integration/Test/ref-archived.md}} Reply OK."
      expect_not_contains: "reference_resolution_failed"
