name: create_then_list_directories
description: >
  create_directory creates a directory in the vault; list_vault(show: "directories")
  confirms it appears. Also verifies that create_directory with root_path produces
  a subtree visible via list_vault(recursive: true). Covers IF-01 and IF-02.
coverage: [IF-01, IF-02]

steps:
  # ── IF-01: Basic create then list ──────────────────────────────────────────

  - label: "Create a test directory for IF-01"
    action: create_directory
    args:
      paths: "_integration/if01/project-docs"

  - label: "list_vault(show: directories) confirms directory appears (IF-01)"
    assert:
      op: list_vault
      args:
        path: "_integration/if01"
        show: "directories"
      expect_contains: "project-docs/"

  # ── IF-02: root_path scaffold → recursive list ──────────────────────────────

  - label: "Create subdirectory tree using root_path for IF-02"
    action: create_directory
    args:
      root_path: "_integration/if02"
      paths: ["notes", "archive", "drafts"]

  - label: "list_vault(recursive: true) shows notes/ (IF-02)"
    assert:
      op: list_vault
      args:
        path: "_integration/if02"
        show: "directories"
        recursive: true
      expect_contains: "notes/"

  - label: "list_vault(recursive: true) shows archive/ (IF-02)"
    assert:
      op: list_vault
      args:
        path: "_integration/if02"
        show: "directories"
        recursive: true
      expect_contains: "archive/"

  - label: "list_vault(recursive: true) shows drafts/ (IF-02)"
    assert:
      op: list_vault
      args:
        path: "_integration/if02"
        show: "directories"
        recursive: true
      expect_contains: "drafts/"
