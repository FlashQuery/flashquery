name: search_memories_only
description: >
  search_all with entity_types=['memories'] returns only memories and excludes
  documents (IS-05). Memory content is present in the result; the document written
  in the same test is absent. Requires embedding configuration because search_all
  over memories uses semantic vector search; skipped without it.
coverage: [IS-05]
deps: [embeddings]

steps:
  - label: "Write a document with specific tag"
    action: vault.write
    name: forest_doc
    path: "nature/forests.md"
    title: "Ancient Forests and Ecosystems"
    content: "Forests are complex ecosystems with interconnected species."
    tags: [nature, forests, smo-tag]

  - label: "Write a memory with the same tag"
    action: memory.write
    name: hiking_mem
    content: "Hiking through the redwood forests was a transcendent experience."
    tags: [smo-tag]

  - sleep: 3
    label: "Wait for fire-and-forget embedding to complete"

  - label: "Memory is listable by tag"
    assert:
      op: list_memories
      args:
        tags: [smo-tag]
      expect_contains: "redwood forests"

  - label: "Memory listing does not contain document title"
    assert:
      op: list_memories
      args:
        tags: [smo-tag]
      expect_not_contains: "Ancient Forests and Ecosystems"

  - label: "search_all with entity_types=[memories] returns memory content (IS-05)"
    assert:
      op: search_all
      args:
        query: "hiking through redwood forests"
        entity_types: [memories]
      expect_contains: "redwood forests"

  - label: "search_all with entity_types=[memories] does not return the document (IS-05)"
    assert:
      op: search_all
      args:
        query: "hiking through redwood forests"
        entity_types: [memories]
      expect_not_contains: "Ancient Forests and Ecosystems"
