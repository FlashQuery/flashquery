name: llm_cost_accumulation
description: >
  Multiple call_model invocations sharing the same trace_id accumulate distinct
  rows in fqc_llm_usage. Each subsequent call's metadata.trace_cumulative.total_calls
  grows monotonically. Verifies COST-01 (runtime recording) end-to-end and confirms
  fire-and-forget writes are visible to the trace_cumulative query in subsequent calls.
coverage: [IL-03]

extra_config:
  llm:
    providers:
      - name: openai
        type: openai-compatible
        endpoint: "https://api.openai.com"
        api_key: "${OPENAI_API_KEY}"
    models:
      - name: fast
        provider_name: openai
        model: "gpt-4o-mini"
        type: language
        cost_per_million:
          input: 0.15
          output: 0.6
    purposes:
      - name: general
        description: "General purpose"
        models: [fast]
        defaults:
          temperature: 0.7

steps:
  - label: "First call_model with trace_id=il03-trace records and reports total_calls=1"
    assert:
      op: call_model
      args:
        resolver: purpose
        name: general
        trace_id: "il03-trace"
        messages:
          - role: user
            content: "Reply with just the digit 1."
      expect_contains: '"total_calls":1'

  - label: "Second call_model with same trace_id reports total_calls=2"
    assert:
      op: call_model
      args:
        resolver: model
        name: fast
        trace_id: "il03-trace"
        messages:
          - role: user
            content: "Reply with just the digit 2."
      expect_contains: '"total_calls":2'
