name: graph_disabled_noop
description: >
  T-Y-001 / IG-01: with graph absent/disabled, existing search and
  default get_document behavior remains unchanged, explicitly requested
  graph_summary returns a zero/default summary, and query_graph returns
  the canonical unsupported envelope.
coverage: [IG-01]
server_modes: [managed]

extra_config:
  graph:
    enabled: false

steps:
  - label: "Write disabled graph no-op fixture"
    action: vault.write
    name: noop_doc
    path: "graph-disabled/noop.md"
    title: "Graph Disabled Noop ${run.id}"
    content: "Graph disabled no-op content remains visible through ordinary document tools."
    tags: ["graph-disabled-${run.id}"]

  - label: "Synchronize ordinary document state"
    action: scan_vault

  - label: "Disabled graph search keeps ordinary JSON document shape"
    assert:
      op: search
      args:
        query: "Graph Disabled Noop ${run.id}"
        mode: filesystem
        entity_types: [documents]
        tags: ["graph-disabled-${run.id}"]
      expect_json_contains:
        path: "results[0].path"
        value: "_integration/graph-disabled/noop.md"
      expect_not_contains: "\"graph_context\""

  - label: "Disabled graph get_document keeps ordinary document output"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
      expect_contains: "Graph disabled no-op content remains visible"
      expect_not_contains: "\"graph_summary\""

  - label: "Disabled graph get_document returns zero graph summary when explicitly requested"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [body, graph_summary]
      expect_contains: "Graph disabled no-op content remains visible"
      expect_json_equals:
        path: "graph_summary.edge_count"
        value: 0

  - label: "Disabled graph requested summary has no relation counts"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_equals:
        path: "graph_summary.edge_counts_by_relation"
        value: {}

  - label: "Disabled graph requested summary has no community labels"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_array_length:
        path: "graph_summary.community_labels"
        equals: 0

  - label: "Disabled graph requested summary reports no stale edges"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_equals:
        path: "graph_summary.stale_edge_count"
        value: 0

  - label: "Disabled graph requested summary reports no contradictions"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_equals:
        path: "graph_summary.has_contradictions"
        value: false

  - label: "Disabled graph requested summary reports no open questions"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_equals:
        path: "graph_summary.has_open_questions"
        value: false

  - label: "Disabled graph requested summary has zero open question count"
    assert:
      op: get_document
      args:
        identifiers: "${noop_doc.fq_id}"
        include: [graph_summary]
      expect_json_equals:
        path: "graph_summary.open_question_count"
        value: 0

  - label: "Disabled graph lint is unsupported"
    assert:
      op: maintain_vault
      args:
        action: graph_lint
      expect_json_equals:
        path: "error"
        value: unsupported

  - label: "Disabled graph lint reports graph_disabled detail"
    assert:
      op: maintain_vault
      args:
        action: graph_lint
      expect_json_equals:
        path: "details.code"
        value: graph_disabled

  - label: "Disabled graph query surface is discoverable but unsupported"
    assert:
      op: query_graph
      args:
        action: schema
      expect_json_equals:
        path: "error"
        value: unsupported

  - label: "Disabled graph query surface reports graph_disabled detail"
    assert:
      op: query_graph
      args:
        action: schema
      expect_json_equals:
        path: "details.code"
        value: graph_disabled
