name: cli_list_tools_paste_back
description: >
  T-Y-014 / INT-MCB-14: diagnostic broker list-tools output is represented as
  paste-ready tool_overrides YAML that can be re-parsed under mcp_servers.<server>.
coverage: [INT-MCB-14]
server_modes: [managed]

extra_config:
  mcp_servers:
    basic:
      transport: stdio
      command: node
      args: ["--import", "tsx", "tests/fixtures/mcp-servers/server-basic.ts"]
      cost_per_call: 0.125
      per_call_timeout_ms: 30000
      tool_overrides: {}
  host:
    mcp_servers: [basic]
    tool_search: disabled

steps:
  - label: "INT-MCB-14 / T-Y-014: flashquery list-tools stdout is paste-ready config-valid YAML"
    assert:
      op: cli.list_tools_paste_back
      args:
        server_id: basic
      expect_contains: "tool_overrides:"
      expect_not_contains: "Server stderr:"
      expect_json_equals:
        path: checks.server_tool_override_is_inert
        value: true
      expect_json_contains:
        path: stdout
        value: "# cost_per_call:"

  - label: "INT-MCB-14 / T-Y-014: paste-back config keeps commented override fields inert"
    assert:
      op: cli.list_tools_paste_back
      args:
        server_id: basic
      expect_json_equals:
        path: checks.override_fields_are_comments
        value: true

  - label: "INT-MCB-14 / T-Y-014: pasted commented scaffolding loads as valid config"
    assert:
      op: cli.list_tools_paste_back
      args:
        server_id: basic
      expect_json_equals:
        path: checks.load_config_exit_code
        value: 0

  - label: "INT-MCB-14 / T-Y-014: host brokered fixture is discoverable for CLI paste-back source"
    assert:
      op: mcp.list_tools
      expect_contains: "basic__echo"
      expect_not_contains: "phase-e-cli-stderr"

  - label: "INT-MCB-14 / T-Y-014: brokered registration keeps override-ready echo metadata visible"
    assert:
      op: mcp.list_tools
      expect_contains: "Echoes the provided value without mutation."
