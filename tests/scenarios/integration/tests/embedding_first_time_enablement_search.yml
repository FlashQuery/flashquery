name: embedding_first_time_enablement_search
description: >
  First-time embedding enablement recipe: write document and memory content,
  run the lifecycle backfill, and verify semantic search returns both entity
  types.
coverage: [IS-50]
deps: [embeddings]
server_modes: [managed]
extra_config:
  embeddings:
    - name: primary
      dimensions: 768
      endpoints:
        - provider_name: local-ollama
          model: nomic-embed-text

steps:
  - label: "Write first-time enablement document"
    action: vault.write
    name: enablement_doc
    path: "embedding/first-time-enable.md"
    title: "First Time Embedding Enablement"
    content: "Calypso enablement recipe document for semantic retrieval."
    tags: [embedding-enable]

  - label: "Write first-time enablement memory"
    action: memory.write
    name: enablement_memory
    content: "Calypso enablement recipe memory for semantic retrieval."
    tags: [embedding-enable]

  - label: "Run first-time lifecycle backfill"
    action: maintain_vault
    args:
      action: backfill_embeddings
      embedding_name: primary
      scope:
        entity_types: [documents, memory]
      max_rows: 0

  - label: "Search returns enabled document and memory semantically"
    assert:
      op: search
      args:
        query: "Calypso enablement recipe semantic retrieval"
        entity_types: [documents, memories]
      expect_path: "embedding/first-time-enable.md"
      expect_contains: "Calypso enablement recipe memory"
