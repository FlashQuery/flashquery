name: embedding_first_time_enablement_search
description: >
  First-time embedding enablement recipe: write document and memory content,
  run the lifecycle backfill, and verify semantic search returns both entity
  types. The YAML integration DSL can assert presence and JSON fields, but it
  cannot express a portable cross-entity relative ranking check for provider-
  dependent semantic scores; ranking remains covered by lower-level search/RRF
  tests and this scenario documents that limitation for IS-50.
coverage: [IS-50, IS-chunk-3]
deps: [embeddings]
server_modes: [managed]
extra_config:
  embeddings:
    - name: primary
      dimensions: 768
      endpoints:
        - provider_name: local-ollama
          model: nomic-embed-text

steps:
  - label: "Write first-time enablement document"
    action: vault.write
    name: enablement_doc
    path: "embedding/first-time-enable.md"
    title: "First Time Embedding Enablement"
    content: "Calypso enablement recipe document for semantic retrieval."
    tags: [embedding-enable]

  - label: "Write first-time enablement memory"
    action: memory.write
    name: enablement_memory
    content: "Calypso enablement recipe memory for semantic retrieval."
    tags: [embedding-enable]

  - label: "Run first-time lifecycle backfill"
    action: maintain_vault
    args:
      action: backfill_embeddings
      embedding_name: primary
      scope:
        entity_types: [documents, memory]
      max_rows: 0

  - label: "Search returns enabled document and memory semantically"
    # IS-50 ranking note: this DSL step proves cross-domain presence after
    # enablement. It intentionally does not assert relative order because
    # provider-dependent semantic scores make a stable doc-vs-memory rank
    # assertion non-portable in the YAML runner.
    assert:
      op: search
      args:
        query: "Calypso enablement recipe semantic retrieval"
        entity_types: [documents, memories]
      expect_path: "embedding/first-time-enable.md"
      expect_contains: "Calypso enablement recipe memory"
      expect_json_contains:
        path: results
        value:
          match_source: [semantic]
      expect_json_equals:
        path: embeddings_queried
        value: [primary]

  - label: "Document semantic search returns matched chunks"
    assert:
      op: search
      args:
        query: "Calypso enablement recipe document semantic retrieval"
        entity_types: [documents]
      expect_path: "embedding/first-time-enable.md"
      expect_json_array_length:
        path: results[0].matched_chunks
        equals: 1
      expect_json_equals:
        path: embeddings_queried
        value: [primary]
