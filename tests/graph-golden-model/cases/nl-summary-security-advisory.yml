description: "Longer passage (security-advisory) — summary should be grounded, representative, and concise."
input: |
  A high-severity vulnerability was found in the file-upload service that allowed an authenticated user to read files outside their workspace via a path-traversal sequence. The issue affected versions 3.1 through 3.4 and was patched in 3.4.1. There is no evidence of exploitation in production based on log review. As a mitigation before patching, operators can disable the legacy upload endpoint. Customers on the managed cloud were patched automatically; self-hosted customers must upgrade manually. A full disclosure will be published 30 days after the patch.
criteria: [grounded, representative, concise]
