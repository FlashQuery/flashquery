kind: record
op: node
input_source: synthetic
description: >
  external_refs extraction of non-RFC identifiers - a URL, a ticket ID, and a runbook ID - fills the
  "URLs / ticket IDs" matrix gap.
input: |
  The outage is described in the incident writeup at https://status.example.com/incidents/42, the fix
  is tracked in JIRA-1234, and the rollback steps are in RUNBOOK-7.
expect:
  certainty_level: high
  staleness_risk_in: [low, medium]
  question_status: null
  question_resolution_present: false
  provenance_present: false
  external_refs_contains: ["status.example.com/incidents/42", "JIRA-1234", "RUNBOOK-7"]
  temporal_markers_empty: true
judge:
  key_claims:
    criteria: [grounded, atomic, complete]
  chunk_summary:
    criteria: [grounded, representative, concise]
structural_only:
  - reasoning
  - analyzed_content_hash
