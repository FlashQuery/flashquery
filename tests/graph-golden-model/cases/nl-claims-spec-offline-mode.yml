kind: nl
field: key_claims
description: "Longer passage (spec-offline-mode) — claims should be grounded, atomic, and complete, capturing the key facts."
input: |
  The offline mode feature lets users keep editing documents without a network connection. Edits are stored locally and synced when connectivity returns, using last-writer-wins for scalar fields and a merge for list fields. The feature is limited to documents under 5 megabytes in the first version. Conflicts that cannot be merged are surfaced to the user with both versions shown side by side. An open question remains about whether to support offline access to shared team templates, which is deferred to a later milestone.
criteria: [grounded, atomic, complete]
must_capture:
  - "offline mode lets users edit documents without a network connection"
  - "edits sync on reconnect using last-writer-wins for scalars and merge for lists"
  - "the first version is limited to documents under 5 megabytes"
  - "unmergeable conflicts are shown to the user side by side"
