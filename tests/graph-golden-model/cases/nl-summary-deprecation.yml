kind: nl
field: chunk_summary
description: End-to-end — the chunk_summary extracted from the deprecation notice should be grounded, representative, and concise. (Extract + judge = 2 model calls; run where there is no per-call time limit.)
input: |
  ## v2 API — Search endpoint deprecation

  The legacy `/search` endpoint is deprecated as of v2 and will be removed. All callers
  must migrate to `/query` before the Q3 2026 cutoff; after that date the old endpoint
  returns 410 Gone. This decision was ratified by the platform team (see RFC-0042).
criteria: [grounded, representative, concise]
must_capture:
  - "the /search endpoint is being deprecated/removed"
