field: key_claims
description: "Longer passage (pricing-change) — claims should be grounded, atomic, and complete, capturing the key facts."
input: |
  The pricing model moves from per-seat to a hybrid of a platform fee plus usage. Existing customers keep their current per-seat pricing until their next renewal, after which they move to the new model. The platform fee includes a baseline allotment of API calls, and overages are billed at a published per-call rate. Nonprofit and education customers receive a 40% discount on the platform fee. Annual prepay earns two free months. The change is effective for new customers on 1 August 2026.
criteria: [grounded, atomic, complete]
must_capture:
  - "pricing moves from per-seat to a platform fee plus usage"
  - "existing customers keep per-seat pricing until their next renewal"
  - "nonprofit and education customers get a 40% discount on the platform fee"
  - "the change is effective for new customers on 1 August 2026"
