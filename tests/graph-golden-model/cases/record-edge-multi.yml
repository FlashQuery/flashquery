kind: record
op: edge
input_source: synthetic
description: >
  Multi-edge (exploratory) - the source both REPLACES the target and gives the REASON, so the model
  may legitimately emit two edges (supersedes + rationale_for). Asserts the primary is one of those and
  tolerates 1-3 edges; surfaces whether the model returns multiple relations for one pair.
source:
  chunk_id: v2
  key_claims:
    - "Policy v2 replaces Policy v1 because v1 allowed unbounded retention, a compliance risk"
target:
  chunk_id: v1
  key_claims:
    - "Policy v1 sets the data retention rules"
expect:
  primary_relation_in: [supersedes, rationale_for]
  expect_relations: [supersedes]
  min_edges: 1
  max_edges: 3
  confidence_min: 0.5
  llm_assessment_in: [strong, moderate]
  reasoning_max_sentences: 2
judge:
  reasoning:
    criteria: [justifies]
structural_only:
  - qualifiers
  - low_confidence_flag
  - source_claims_referenced
  - target_claims_referenced
