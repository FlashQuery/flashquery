kind: nl
field: key_claims
description: "Longer passage (policy-data-retention) — claims should be grounded, atomic, and complete, capturing the key facts."
input: |
  Under the updated data-retention policy, customer event logs are kept for 13 months and then permanently deleted. Personally identifiable information in support tickets must be redacted within 30 days of ticket closure. Backups follow a separate schedule: encrypted snapshots are retained for 35 days. The policy takes effect on 1 July 2026, and teams must complete the migration of existing logs by that date. An exception process exists for legal holds, which suspend deletion until the hold is lifted.
criteria: [grounded, atomic, complete]
must_capture:
  - "customer event logs are retained for 13 months then permanently deleted"
  - "PII in support tickets must be redacted within 30 days of closure"
  - "encrypted backup snapshots are retained for 35 days"
  - "the policy takes effect on 1 July 2026"
