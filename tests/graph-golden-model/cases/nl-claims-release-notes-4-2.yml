input: |
  Release 4.2 adds streaming exports for reports larger than 100k rows, which previously timed out. It also introduces SAML SSO for enterprise workspaces and a redesigned audit log with per-field change history. Two breaking changes ship in this release: the v1 webhook signature scheme is removed in favor of HMAC-SHA256, and the deprecated /reports/legacy endpoint is deleted. Customers on annual plans get the new usage dashboard a week before monthly plans. The mobile app is unaffected by these changes.
criteria: [grounded, atomic, complete]
