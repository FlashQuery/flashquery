description: "Longer passage (incident-payments) — summary should be grounded, representative, and concise."
input: |
  On 14 March the payments API returned elevated 5xx errors for 47 minutes during peak traffic. The root cause was a database connection pool that was exhausted after a deploy raised the per-request query count. A secondary factor was that autoscaling never triggered because the alarm threshold had been set too high. Customer impact was limited to checkout, where roughly 12% of transactions failed and were automatically retried. The team has since lowered the alarm threshold, capped per-request queries, and added a connection-pool saturation dashboard. A follow-up review of all peak-traffic alarms is scheduled for next quarter.
criteria: [grounded, representative, concise]
must_capture:
  - "a database connection pool exhaustion caused a payments API incident"
