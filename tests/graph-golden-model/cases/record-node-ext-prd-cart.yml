kind: record
op: node
input_source: external
source_note: "chatprd.ai PRD example - Problem Statement excerpt"
description: >
  External (real PRD body text). Data-backed problem statement - tests certainty on a stat-grounded
  claim, provenance from a named internal data source, and no dates/citations.
input: |
  Users often abandon their carts because they're not ready to purchase but want to revisit items
  later. Without a way to save products easily, they may forget items or leave the app entirely,
  reducing conversion rates. Data shows 15% of users cite 'indecision' as a reason for cart
  abandonment in our post-checkout surveys.
expect:
  certainty_level_in: [high, medium]
  staleness_risk_in: [medium, low]
  question_status: null
  question_resolution_present: false
  provenance_present: true
  external_refs_empty: true
  temporal_markers_empty: true
judge:
  key_claims:
    criteria: [grounded, atomic, complete]
    must_capture:
      - "15% of users cite indecision as a reason for cart abandonment"
  chunk_summary:
    criteria: [grounded, representative, concise]
structural_only:
  - reasoning
  - analyzed_content_hash
