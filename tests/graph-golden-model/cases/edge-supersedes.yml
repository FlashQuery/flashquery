kind: edge
description: Source updates/replaces the target's now-outdated value — supersedes.
source:
  chunk_id: policy-v2
  key_claims:
    - "As of v2, the default request retry limit is 5"
    - "This replaces the earlier retry limit"
target:
  chunk_id: policy-v1
  key_claims:
    - "The default request retry limit is 3"
expect:
  primary_relation: supersedes
  expect_relations: [supersedes]
  min_edges: 1
