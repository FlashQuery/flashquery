kind: edge
description: Source explicitly replaces the target document in full (clean supersession, not a value conflict). A replaced numeric value reads as both supersedes and contradicts, so this uses a document-level replacement to isolate supersedes.
source:
  chunk_id: policy-2026
  key_claims:
    - "The 2026 Security Policy supersedes and fully replaces the 2024 Security Policy"
target:
  chunk_id: policy-2024
  key_claims:
    - "The 2024 Security Policy defines the organization's access rules"
expect:
  primary_relation_in: [supersedes]
  min_edges: 1
