description: "Longer passage (sla-enterprise) — summary should be grounded, representative, and concise."
input: |
  The enterprise SLA guarantees 99.95% monthly uptime, measured excluding scheduled maintenance windows announced at least 72 hours in advance. If uptime falls below 99.95% but stays above 99.9%, the customer receives a 10% service credit; below 99.9%, the credit rises to 25%. Support response targets are one hour for critical issues and one business day for low-severity issues. Credits must be requested within 30 days of the affected month. The SLA does not cover outages caused by the customer's own misconfiguration.
criteria: [grounded, representative, concise]
must_capture:
  - "the enterprise SLA promises 99.95% uptime with tiered service credits and a one-hour critical response target"
