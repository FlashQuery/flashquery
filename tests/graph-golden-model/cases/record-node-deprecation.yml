kind: record
op: node
input_source: synthetic   # info-only: hand-written chunk (vs. 'external' = real web/doc text)
description: >
  Full-record (README §14): a production-faithful chunk → analyze_node → EVERY output field checked.
  Enum/structural fields via expected-vs-actual; key_claims / chunk_summary / reasoning via
  per-field LLM-as-judge; the system-filled hash waived via structural_only. The coverage guard
  fails the case if any field is left without an expectation.
input: |
  The deprecation of the legacy /search endpoint was ratified in RFC-0042. All existing integrations
  must migrate to /v2/query before the Q3 2026 cutoff, after which the legacy endpoint will be
  removed.
expect:
  certainty_level: high
  staleness_risk: high
  question_status: null
  provenance_present: true
  provenance_basis_contains: ["RFC-0042"]
  question_resolution_present: false
  external_refs_contains: ["RFC-0042"]
  temporal_markers_min: 1
  key_claims_min: 2
judge:
  key_claims:
    criteria: [grounded, atomic, complete]
    must_capture:
      - "the legacy /search endpoint is deprecated"
      - "migration must complete before the Q3 2026 cutoff"
  chunk_summary:
    criteria: [grounded, representative, concise]
structural_only:
  # reasoning is non-persisted chain-of-thought (our override field): it justifies the
  # certainty/staleness calls rather than extracting from the source, so the source-grounding
  # criteria (grounded/faithful) don't fit it. Waive it here; add a purpose-fit criterion later.
  - reasoning
  # system-filled post-parse (fallbackContentHash); the model emits "".
  - analyzed_content_hash
