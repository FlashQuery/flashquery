input: |
  We introduce RealPlay, a neural network-based real-world game engine that enables interactive video
  generation from user control signals. Unlike prior works focused on game-style visuals, RealPlay
  aims to produce photorealistic, temporally consistent video sequences that resemble real-world
  footage. It operates in an interactive loop: users observe a generated scene, issue a control
  command, and receive a short video chunk in response.
