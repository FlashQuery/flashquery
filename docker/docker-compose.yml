name: flashquery

# FlashQuery — Full Stack Docker Compose
# Starts FlashQuery (HTTP transport) + Postgres/pgvector + PostgREST + GoTrue + Kong + Studio
#
# Usage:
#   make up
#   # or, from the repo root:
#   docker compose --env-file docker/.env.docker -f docker/docker-compose.yml up -d
#
# Prerequisites:
#   - Run `npm run setup` and choose the bundled Docker stack, or copy
#     docker/.env.docker.example to docker/.env.docker and fill in values
#   - POSTGRES_PASSWORD must be set in docker/.env.docker (no default — fail loudly)
#   - VAULT_PATH defaults to ./vault (relative to repo root)
#
# After startup:
#   - FlashQuery HTTP MCP endpoint: http://localhost:3100/mcp
#   - Supabase API gateway: http://localhost:8000
#   - Postgres: localhost:5432
# Host ports can be overridden with FQC_HOST_PORT, SUPABASE_HOST_PORT,
# and POSTGRES_HOST_PORT when the defaults conflict with an existing stack.
#
# PostgREST, GoTrue, and Studio are internal to the Compose network by default.
# Kong exposes the Supabase API gateway on :8000, and Postgres is exposed on
# :5432 for host-side tools and tests. If you need direct host access to an
# internal service, uncomment that service's ports: block below.

services:

  # =========================================================================
  # Postgres 15 with pgvector (pre-built in supabase/postgres image)
  # =========================================================================
  postgres:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    environment:
      POSTGRES_DB: flashquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"  # exposed for host-side tools (test runner, SQL clients)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flashquery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # =========================================================================
  # PostgREST — auto-generates REST API from Postgres schema
  # =========================================================================
  postgrest:
    image: postgrest/postgrest:v14.6
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/flashquery
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    # ports:
    #   - "3000:3000"  # uncomment for direct host PostgREST access
    depends_on:
      postgres:
        condition: service_healthy

  # =========================================================================
  # GoTrue — Supabase auth service (JWT issuance, user management)
  # =========================================================================
  gotrue:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/flashquery?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3001
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
      API_EXTERNAL_URL: http://localhost:${SUPABASE_HOST_PORT:-8000}
    # ports:
    #   - "9999:9999"  # uncomment for direct host GoTrue access
    depends_on:
      postgres:
        condition: service_healthy

  # =========================================================================
  # Kong — API gateway (routes /rest/v1 → postgrest, /auth/v1 → gotrue)
  # =========================================================================
  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: bundled,request-transformer,cors
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "${SUPABASE_HOST_PORT:-8000}:8000"
    depends_on:
      - postgrest
      - gotrue

  # =========================================================================
  # Supabase Studio — web-based DB and project management UI
  # =========================================================================
  studio:
    image: supabase/studio:2026.03.16-sha-5528817
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://postgrest:3000
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: FlashQuery
      DEFAULT_PROJECT_NAME: FlashQuery
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:${SUPABASE_HOST_PORT:-8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    # Next.js 15+ binds to the container hostname, not 127.0.0.1, so the
    # built-in healthcheck (which uses localhost) always fails. Override it
    # to use the container's actual hostname via os.hostname().
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://'+require('os').hostname()+':3000/api/platform/profile',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ports:
    #   - "3001:3000"  # uncomment for Supabase Studio at http://localhost:3001
    depends_on:
      - postgrest
      - gotrue

  # =========================================================================
  # FlashQuery — MCP server with HTTP transport on port 3100
  # =========================================================================
  flashquery:
    container_name: flashquery
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      # Docker-specific overrides (these differ from .env values)
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/flashquery
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VAULT_PATH: /app/vault
      LOG_PATH: /app/logs
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_AUTH_SECRET: ${MCP_AUTH_SECRET:-ci-smoke-test-secret}
      INSTANCE_NAME: ${INSTANCE_NAME:-FlashQuery}
      INSTANCE_ID: ${INSTANCE_ID:-flashquery-docker-01}
      # LLM provider variables consumed by flashquery.yml. Providers use these
      # values for endpoints/API keys; models and purposes are selected in YAML.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
    command: start --transport http --config ./flashquery.yml
    volumes:
      - ${VAULT_PATH:-./vault}:/app/vault
      - ${LOG_PATH:-./logs}:/app/logs
    ports:
      - "${FQC_HOST_PORT:-3100}:3100"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
