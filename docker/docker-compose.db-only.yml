name: flashquery

# FlashQuery — Database-Only Docker Compose
# Starts only Postgres with pgvector; FlashQuery runs locally on host.
#
# Usage:
#   docker compose -f docker/docker-compose.db-only.yml up -d
#
# Then start FlashQuery locally (stdio transport):
#   cd src && npm run dev
#   # or: npx flashquery start --config ./flashquery.yaml
#
# Prerequisites:
#   - Copy .env.example to .env and fill in POSTGRES_PASSWORD
#   - No Supabase cloud instance needed — all DB services are containerized
#
# After startup:
#   - Postgres: localhost:5432
#   - FlashQuery runs on host (not in container); connects to localhost:5432 via DATABASE_URL

services:

  # =========================================================================
  # Postgres 15 with pgvector (pre-built in supabase/postgres image)
  # pgvector extension created via docker/init/01-extensions.sql on first start
  # =========================================================================
  postgres:
    env_file:
      - ../.env
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    environment:
      POSTGRES_DB: flashquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flashquery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
