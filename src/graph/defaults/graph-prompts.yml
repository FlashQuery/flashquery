prompts:
  - id: analyze_node
    version: "2"
    template: |-
      You analyze ONE document chunk for a knowledge graph. Return ONLY a JSON object
      matching the schema below — no prose, no markdown, no code fences. Output exactly ONE
      well-formed JSON object: close every array and string, never emit an empty-string
      element in key_claims, and never let one field's value appear inside another's array.

      First fill "reasoning" with a brief 1-2 sentence evaluation (justify certainty_level
      and staleness_risk against the definitions). Complete it BEFORE the other fields.

      Schema (keys, in this order):
      - reasoning: string
          Write this FIRST. ONE or TWO sentences MAX (never a paragraph). State the logical basis for
          your assessment by citing the specific cue(s) in the chunk that drive certainty_level and
          staleness_risk — e.g. "States a ratified decision with a hard Q3 2026 cutoff, so certainty
          is high and staleness risk is high." This thinking step exists to improve the fields that
          follow; keep it tight and evidence-based.
      - key_claims: a FLAT JSON array of NON-EMPTY strings, in order. Each entry is ONE
          atomic fact. Do not nest arrays; do not emit empty strings. Consolidate to the
          distinct key facts (typically 3-10 for a chunk), not every sub-clause. But do NOT
          drop information: include consequences, deadlines, conditions, and comparative
          results. If a statement pairs a fact with its consequence (e.g. "kept 13 months,
          then deleted"), keep BOTH halves rather than only the first. SPLIT lists and
          enumerations: if the text enumerates items (first/second/third, or a/b/c), make
          EACH item its own claim rather than one claim listing them all.
      - chunk_summary: string        (one sentence; include all mentioned key details or constraints, numbers, dates, thresholds, deadlines, exceptions, risk qualifiers, causal or attribution details, important negative or safety qualifiers, key evidence, and similar kinds of details that describe the uniqueness of the text.)
      - provenance_basis: string|null
          Name the cited source that GROUNDS the claims — the doc/report/dataset/survey/system/RFC/
          ADR/ticket/URL that measures, ratifies, approves, or reports them. The source may be EXTERNAL
          or INTERNAL — internal grounding sources count too (e.g. "our post-checkout surveys", an
          internal report or dashboard). Return only the source identifier/name, not a narrative
          sentence. The SAME identifier can appear in BOTH provenance_basis and external_refs — if it
          grounds/ratifies/measures/reports the claim, name it HERE as well, not only in external_refs.
          A source that is merely the SUBJECT of a definitional claim is NOT provenance: "the
          Deprecation header is defined in RFC 9745" does NOT make RFC 9745 the provenance (the claim
          is about the RFC, not grounded by a separate measuring/reporting source) — just as a plain
          definition is not "grounded" by a dictionary.
          Use null when no grounding source is cited — never cite "the text" itself.
      - question_status: "open"|"deferred"|"resolved"|null
          Set null unless the chunk explicitly raises a specific question or a decision/choice it is
          tracking. The question/decision need NOT contain a literal "?". IMPORTANT: tentativeness
          about a FACT — "preliminary", "likely", "not yet confirmed", a floated idea with no
          decision — is captured by certainty_level, NOT here; do NOT mark such content open.
          open = the chunk explicitly poses an unresolved question, or names a decision/choice it is
            actively trying to settle, and leaves it unsettled.
          deferred = such a question/decision is explicitly postponed/tabled (set deferred even when
            phrased as a statement, e.g. "the question of X was postponed").
          resolved = such a question/decision is raised AND answered/decided within this chunk (set
            resolved, NOT null, even though it now has an answer).
          Examples:
            "Should we shard by tenant or region? The team has not decided." -> open
            "Should we shard by tenant or region? The team decided tenant." -> resolved
            "The question of multi-region failover was postponed to next quarter." -> deferred
            "Preliminary analysis suggests latency will likely improve, pending a benchmark." -> null (tentative fact; see certainty_level)
            "We floated the idea of a rewrite but made no decision." -> null (a passing idea, not a tracked question)
            "UTC is the primary civil time standard." -> null (states a fact; no question/decision)
      - question_resolution: string|null
          If question_status is resolved, state the actual answer/decision/resolution in one concise
          sentence, including the option chosen and any important condition/deadline. Otherwise null.
      - certainty_level: "high"|"medium"|"low"|"unknown"
          Score confidence in the extracted factual claims/source, not confidence that the text
          literally contains uncertainty words.
          high = stated as settled/decided/ratified/factual.
          medium = leaning one way WITH some basis but not yet confirmed — cue words like
                   "likely", "probably", "strongly suggests", "appears", "preliminary".
          low = little or no basis: pure speculation, a bare possibility, or just an idea/proposal.
                Also use low when the chunk says the source/data is unlabeled, unclear, or ambiguous.
          unknown = not determinable.
      - staleness_risk: "low"|"medium"|"high"|"unknown"
          high = pinned to an expiring anchor (deadline, cutoff, version cutover, dated
                 decision); score high even before that date arrives.
          medium = true now but drifts with no fixed expiry (counts, status, ownership).
          low = durable (definitions, concepts, design rationale, historical facts).
          unknown = cannot tell.
      - external_refs: string[]
          Extract EVERY external identifier the chunk names, each as its own string, copied as it
          appears. An external reference is anything that points outside the chunk: RFC/standard
          numbers ("RFC 8259"), named documents/reports/datasets/surveys ("Customer Analytics Dataset
          Q2-2026"), product/protocol + version names ("OAuth 2.0", "v3.0"), API endpoint paths
          ("/v1/search"), URLs, and ticket IDs ("JIRA-1234") — INCLUDING ones in parentheticals like
          "(see RFC-0042)".
          Example: "migrate off /v1/search per RFC 8594 before v3.0; see the 2025 SO Developer Survey"
          -> ["/v1/search", "RFC 8594", "v3.0", "2025 SO Developer Survey"].
          Use [] only if the chunk names nothing external.
      - temporal_markers: string[]
          Capture EVERY time or version reference, each as its own string, copied as it appears in the
          text. Include all of these kinds: absolute dates ("2026-03-14"), quarters/months
          ("Q3 2026", "March 2026"), relative terms ("next Friday", "in 18 months"), deadlines
          ("By end of Q3"), AND semantic version markers ("v2.1.0", "v3.0", "version 2.1").
          Example: "ships in v2.1.0 by Q3 2026 and the old API sunsets after v3.0" ->
          ["v2.1.0", "Q3 2026", "v3.0"]. Copy each EXACTLY as written — do NOT normalize or infer a
          date (keep "Next Friday" as "Next Friday"; never compute what it resolves to).
          Use [] only if the chunk has no time or version reference.
      - analyzed_content_hash: string  (leave "" — the system fills this in)

      Example of the OUTPUT FORMAT only (illustrative — do NOT copy its content; note
      every list is an array and any cited identifier appears in external_refs):
      {"reasoning":"Defines a term; stated as fact, no expiry, cites a standard.","key_claims":["UTC is the primary time standard"],"chunk_summary":"Explains what UTC is and cites the standard.","provenance_basis":"ITU-R TF.460","question_status":null,"question_resolution":null,"certainty_level":"high","staleness_risk":"low","external_refs":["ITU-R TF.460"],"temporal_markers":[],"analyzed_content_hash":""}

      Chunk:
      {{chunk_content}}
    required_variables:
      - chunk_content
    overridable: true
  - id: classify_edge
    version: "2"
    template: |-
      You classify the relationship FROM the source chunk TO the target chunk for a
      knowledge graph. Return ONLY a JSON object { "edges": Edge[] } — no prose, no fences.
      Emit an empty edges array if no relationship holds.

      Classified relation types:
      {{graph:classified_types}}

      Each Edge has:
      - reasoning: string          
          Write this FIRST. ONE or TWO sentences MAX (never a paragraph).
      - relation: one of the relation names above (choose the most specific)
      - source_claims_referenced: number[]   (indices into source_key_claims)
      - target_claims_referenced: number[]   (indices into target_key_claims)
      - confidence_score: number 0..1   (how confident the relationship holds; LOWER it when the
          source hedges its claim — "may", "might", "possibly", "not sure" — or the link is indirect)
      - metadata:
          llm_assessment: "strong"|"moderate"|"weak"|"uncertain"
            How solid the link is. Use "strong" only for a clearly stated, direct relationship; drop
            to "weak" or "uncertain" when the source HEDGES the claim ("may", "might", "possibly",
            "not sure", "unclear") or the connection is tenuous. A non-empty uncertainty qualifier
            should travel with weak/uncertain AND a lower confidence_score.
          qualifiers: { temporal: string[], conditional: string[], uncertainty: string[] }
            Each qualifier is an ARRAY of strings (a list, even for a single item) — e.g.
            "conditional": ["only when the working set fits in memory"]. Never a bare string.
            Inspect the relationship for constraints and RECORD them:
            - conditional: REQUIRED whenever the source qualifies its claim with words like
              "when", "if", "only", "provided", "as long as", "unless" — put that condition
              as a one-element array. Do not leave it empty if such a condition is present.
            - temporal: time/version bounds, copied as written — e.g. ["As of v2"], ["After Q3 2026"],
              ["Until the migration completes"], ["Since 1.4"].
            - uncertainty: hedges that weaken the link, copied as written — e.g. ["may"], ["might"],
              ["possibly"], ["we are not sure"]. When present, also set llm_assessment to
              weak/uncertain and lower confidence_score.
            Use [] for a kind that does not apply.

      Source:
      {{source_chunk}}

      Target:
      {{target_chunk}}
    required_variables:
      - graph:classified_types
      - source_chunk
      - target_chunk
    overridable: true
